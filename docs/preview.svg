<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Matrix Block Canvas preview</title>
  <desc id="desc">A stylized preview of a browser GUI for editing categorical block-matrix figures.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#eef7f2"/>
      <stop offset="56%" stop-color="#f7fafc"/>
      <stop offset="100%" stop-color="#ecfeff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="1200" height="620" rx="34" fill="url(#bg)"/>
  <circle cx="1040" cy="92" r="120" fill="#d9f99d" opacity="0.45"/>
  <circle cx="110" cy="540" r="160" fill="#bae6fd" opacity="0.48"/>

  <g filter="url(#shadow)">
    <rect x="74" y="64" width="1052" height="492" rx="26" fill="#ffffff"/>
    <rect x="74" y="64" width="1052" height="72" rx="26" fill="#102018"/>
    <rect x="74" y="112" width="1052" height="24" fill="#102018"/>
  </g>

  <text x="118" y="109" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800" fill="#ffffff">Matrix Block Canvas</text>
  <text x="404" y="109" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="600" fill="#b7f7d5">TSV to publication-ready block figures</text>
  <rect x="918" y="84" width="154" height="34" rx="17" fill="#22c55e"/>
  <text x="949" y="107" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800" fill="#082f1a">Export SVG</text>

  <rect x="112" y="176" width="292" height="332" rx="18" fill="#f8fafc" stroke="#d7e2dc"/>
  <text x="140" y="220" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" fill="#102018">GUI controls</text>
  <text x="140" y="251" font-family="Inter, Arial, sans-serif" font-size="15" fill="#475569">色・ラベル・領域・注釈を画面で調整</text>
  <rect x="140" y="286" width="218" height="18" rx="9" fill="#d1fae5"/>
  <rect x="140" y="322" width="156" height="18" rx="9" fill="#bae6fd"/>
  <rect x="140" y="358" width="188" height="18" rx="9" fill="#fde68a"/>
  <rect x="140" y="410" width="92" height="36" rx="10" fill="#06b6d4"/>
  <rect x="246" y="410" width="92" height="36" rx="10" fill="#fde047"/>
  <rect x="140" y="458" width="198" height="12" rx="6" fill="#cbd5e1"/>

  <rect x="456" y="176" width="612" height="332" rx="18" fill="#ffffff" stroke="#d7e2dc"/>
  <text x="490" y="220" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" fill="#102018">Block matrix preview</text>
  <text x="490" y="251" font-family="Inter, Arial, sans-serif" font-size="15" fill="#475569">Paste TSV, tune in GUI, export for papers and slides.</text>

