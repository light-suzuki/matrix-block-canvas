      <rect x="0" y="104" width="48" height="48" fill="#06b6d4"/><rect x="52" y="104" width="48" height="48" fill="#ffffff" stroke="#111827"/><rect x="104" y="104" width="48" height="48" fill="#fde047"/><rect x="156" y="104" width="48" height="48" fill="#fde047"/><rect x="208" y="104" width="48" height="48" fill="#06b6d4"/><rect x="260" y="104" width="48" height="48" fill="#06b6d4"/><rect x="312" y="104" width="48" height="48" fill="#fde047"/><rect x="364" y="104" width="48" height="48" fill="#ffffff" stroke="#111827"/>
      <rect x="0" y="156" width="48" height="48" fill="#fde047"/><rect x="52" y="156" width="48" height="48" fill="#06b6d4"/><rect x="104" y="156" width="48" height="48" fill="#cbd5e1"/><rect x="156" y="156" width="48" height="48" fill="#06b6d4"/><rect x="208" y="156" width="48" height="48" fill="#fde047"/><rect x="260" y="156" width="48" height="48" fill="#ffffff" stroke="#111827"/><rect x="312" y="156" width="48" height="48" fill="#06b6d4"/><rect x="364" y="156" width="48" height="48" fill="#fde047"/>
